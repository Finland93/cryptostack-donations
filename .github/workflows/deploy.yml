name: Deploy to WordPress.org

# Pushes the plugin to the WordPress.org SVN repository.
# Requires repo secrets SVN_USERNAME and SVN_PASSWORD (your WP.org account),
# and that the plugin has ALREADY been approved on WordPress.org.
# Store listing assets (icon, banner, screenshots) live in .wordpress-org/.
#
# Trigger is manual (workflow_dispatch) on purpose: do NOT run this until the
# plugin is approved and the secrets are set, otherwise it will fail because the
# SVN repo does not exist yet. After approval, run it from the Actions tab, or
# switch the trigger below to `release: types: [published]` for auto-deploys.

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: WordPress.org deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: cryptostack-donations
          ASSETS_DIR: .wordpress-org
