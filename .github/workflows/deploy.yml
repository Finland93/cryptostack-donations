name: Deploy to WordPress.org

# Pushes a tagged release to the WordPress.org SVN repository.
# Requires repo secrets SVN_USERNAME and SVN_PASSWORD (your WP.org account),
# and that the plugin has been approved on WordPress.org first.
# Store listing assets (icon, banner, screenshots) live in .wordpress-org/.

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: WordPress.org deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: cryptostack-donations
          ASSETS_DIR: .wordpress-org
