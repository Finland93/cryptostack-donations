name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-lint:
    name: PHP lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.4', '8.3']
    steps:
      - uses: actions/checkout@v7
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Lint all PHP files
        run: |
          find . -path ./node_modules -prune -o -path ./vendor -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Assemble distributable plugin (mirror the release zip)
        run: |
          mkdir -p dist/cryptostack-donations
          rsync -a \
            --exclude-from='.distignore' \
            --exclude='/.wordpress-org' \
            --exclude='/.vite' \
            --exclude='/dist' \
            ./ dist/cryptostack-donations/
          echo "=== Files that will ship ==="
          find dist/cryptostack-donations -type f | sort
      - name: Run Plugin Check on the distributable plugin
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: dist/cryptostack-donations

  build:
    name: Build wallet bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Verify bundle output
        run: |
          test -f build/appkit-bundle.js
          SIZE=$(stat -c%s build/appkit-bundle.js)
          echo "bundle size: $SIZE bytes"
          test "$SIZE" -gt 100000
          grep -q "window.CSDAppKit" build/appkit-bundle.js
