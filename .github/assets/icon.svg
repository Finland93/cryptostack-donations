<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="CryptoStack Donations icon">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="sol" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9945FF"/><stop offset="1" stop-color="#14F195"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#g)"/>
  <!-- stacked coin -->
  <ellipse cx="128" cy="150" rx="62" ry="20" fill="#4c1d95" opacity="0.55"/>
  <ellipse cx="128" cy="120" rx="62" ry="20" fill="#ffffff"/>
  <ellipse cx="128" cy="118" rx="62" ry="20" fill="#ede9fe"/>
  <text x="128" y="128" text-anchor="middle" font-size="30" font-weight="800" fill="#6d28d9" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif">◆</text>
  <!-- three chain dots -->
  <circle cx="98" cy="196" r="13" fill="#F7931A"/>
  <text x="98" y="201" text-anchor="middle" font-size="14" font-weight="800" fill="#fff" font-family="Arial">₿</text>
  <circle cx="128" cy="196" r="13" fill="#627EEA"/>
  <text x="128" y="201" text-anchor="middle" font-size="14" font-weight="800" fill="#fff" font-family="Arial">Ξ</text>
  <circle cx="158" cy="196" r="13" fill="url(#sol)"/>
  <text x="158" y="201" text-anchor="middle" font-size="13" font-weight="800" fill="#fff" font-family="Arial">◎</text>
</svg>
