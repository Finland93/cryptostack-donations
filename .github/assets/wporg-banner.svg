<svg xmlns="http://www.w3.org/2000/svg" width="1544" height="500" viewBox="0 0 1544 500" role="img" aria-label="CryptoStack Donations">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="sol" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9945FF"/><stop offset="1" stop-color="#14F195"/>
    </linearGradient>
    <style>.t{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}</style>
  </defs>
  <rect width="1544" height="500" fill="url(#bg)"/>
  <circle cx="1300" cy="120" r="300" fill="url(#accent)" opacity="0.13"/>
  <circle cx="1420" cy="430" r="220" fill="#14F195" opacity="0.06"/>

  <text class="t" x="96" y="210" fill="#ffffff" font-size="76" font-weight="800">CryptoStack Donations</text>
  <text class="t" x="100" y="262" fill="#c4b5fd" font-size="32" font-weight="600">Multi-chain crypto donations for WordPress</text>

  <g class="t" font-size="24" font-weight="700">
    <g transform="translate(100,300)">
      <rect width="186" height="54" rx="27" fill="#0b1424" stroke="#2c3a57"/>
      <circle cx="32" cy="27" r="16" fill="#F7931A"/><text x="32" y="34" fill="#fff" font-size="19" font-weight="800" text-anchor="middle">₿</text>
      <text x="60" y="35" fill="#e8edf6">Bitcoin</text>
    </g>
    <g transform="translate(302,300)">
      <rect width="204" height="54" rx="27" fill="#0b1424" stroke="#2c3a57"/>
      <circle cx="32" cy="27" r="16" fill="#627EEA"/><text x="32" y="34" fill="#fff" font-size="19" font-weight="800" text-anchor="middle">Ξ</text>
      <text x="60" y="35" fill="#e8edf6">Ethereum</text>
    </g>
    <g transform="translate(522,300)">
      <rect width="176" height="54" rx="27" fill="#0b1424" stroke="#2c3a57"/>
      <circle cx="32" cy="27" r="16" fill="url(#sol)"/><text x="32" y="34" fill="#fff" font-size="18" font-weight="800" text-anchor="middle">◎</text>
      <text x="60" y="35" fill="#e8edf6">Solana</text>
    </g>
  </g>

  <text class="t" x="100" y="408" fill="#94a3b8" font-size="22" font-weight="500">No smart contracts &#160;·&#160; Non-custodial &#160;·&#160; WalletConnect &#160;·&#160; Block, shortcode &amp; widget</text>

  <g transform="translate(1190,110)">
    <rect width="260" height="220" rx="26" fill="#161f33" stroke="#2c3a57"/>
    <rect x="28" y="34" width="204" height="24" rx="7" fill="#1f2c46"/>
    <rect x="28" y="78" width="204" height="24" rx="7" fill="#1f2c46"/>
    <rect x="28" y="126" width="204" height="54" rx="12" fill="url(#accent)"/>
    <text class="t" x="130" y="161" fill="#ffffff" font-size="22" font-weight="800" text-anchor="middle">Donate</text>
  </g>
</svg>
